name: Bug report
description: Report a defect in html-to-pdf
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps, inputs, or a curl command that reproduces the issue.
      placeholder: |
        1. Run `docker compose up`
        2. POST to `/v1/render` with ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs, stack traces, or screenshots. Scrub any secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: html-to-pdf version or git SHA
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Run mode
      options:
        - Sync HTTP (/v1/render)
        - Async job (BullMQ worker)
        - CLI (bin/htp.ts)
        - Other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node version, Docker version if applicable
      placeholder: "Ubuntu 24.04, Node 22.8.0, Docker 27.x"
