name: Feature request
description: Suggest an enhancement to html-to-pdf
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? What is the current limitation?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you think this should work? API shape, config, flags, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues.
